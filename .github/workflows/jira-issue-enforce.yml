name: Enforce Jira Issue Key Consistency

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Collect issue keys from branch, title, commits
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          TITLE="${{ github.event.pull_request.title }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          # ===== 여기서 프로젝트 키를 제한하고 싶으면 CALC 로 고정 =====
          # 예: CALC-123 형태만 허용
          PATTERN='CALC-[0-9]+'

          echo "PR title : $TITLE"
          echo "PR branch: $BRANCH"

          # 1) 브랜치에서 이슈키 추출 (반드시 1개여야 함)
          BR_KEYS=$(echo "$BRANCH" | grep -Eo "$PATTERN" | sort -u || true)
          BR_COUNT=$(echo "$BR_KEYS" | sed '/^\s*$/d' | wc -l | tr -d ' ')

          if [ "$BR_COUNT" -ne 1 ]; then
            echo "❌ Branch name must contain exactly ONE issue key like feature/CALC-123-..."
            echo "   Found in branch: [$BR_KEYS]"
            exit 1
          fi

          BR_KEY=$(echo "$BR_KEYS" | head -n 1)
          echo "✅ Branch issue key: $BR_KEY"

          # 2) PR 제목에도 같은 키가 들어가야 함
          if ! echo "$TITLE" | grep -Eq "$BR_KEY"; then
            echo "❌ PR title must include the SAME issue key as branch."
            echo "   Expected: $BR_KEY"
            echo "   Title: $TITLE"
            exit 1
          fi
          echo "✅ PR title contains: $BR_KEY"

          # 3) PR 커밋 목록 가져오기
          COMMITS_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits")
          COMMIT_COUNT=$(echo "$COMMITS_JSON" | jq 'length')

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "❌ No commits found in PR."
            exit 1
          fi

          # 4) 각 커밋 메시지에 같은 키가 반드시 포함되어야 함
          #    (커밋마다 강제)
          FAIL=0
          INDEX=0
          echo "$COMMITS_JSON" | jq -r '.[].commit.message' | while IFS= read -r MSG; do
            INDEX=$((INDEX+1))
            # 메시지에서 다른 이슈키가 섞여 있는지도 체크
            ALL_KEYS=$(echo "$MSG" | grep -Eo "$PATTERN" | sort -u || true)

            # 커밋에 이슈키가 아예 없으면 실패
            if [ -z "$ALL_KEYS" ]; then
              echo "❌ Commit #$INDEX has NO issue key. Must include $BR_KEY"
              echo "   Message: $MSG"
              FAIL=1
              continue
            fi

            # 커밋에 브랜치 키가 포함되어야 함
            if ! echo "$MSG" | grep -Eq "$BR_KEY"; then
              echo "❌ Commit #$INDEX issue key mismatch. Must include $BR_KEY"
              echo "   Found keys: [$ALL_KEYS]"
              echo "   Message: $MSG"
              FAIL=1
              continue
            fi

            # 커밋에 다른 키가 같이 있으면(예: CALC-1 과 CALC-2 같이) 실패 처리하고 싶다면 아래 활성화
            # 다른 키가 섞이면 혼선이 커서 보통 막는 걸 추천함.
            OTHER_KEYS=$(echo "$ALL_KEYS" | grep -v -E "^$BR_KEY$" || true)
            if [ -n "$OTHER_KEYS" ]; then
              echo "❌ Commit #$INDEX contains OTHER issue keys besides $BR_KEY: [$OTHER_KEYS]"
              echo "   Message: $MSG"
              FAIL=1
              continue
            fi

            echo "✅ Commit #$INDEX OK"
          done

          # while subshell 때문에 FAIL이 반영 안될 수 있으니, 다시 검사 로직을 bash 배열로 수행
          # (안전하게 재검증)
          MESSAGES=$(echo "$COMMITS_JSON" | jq -r '.[].commit.message')
          I=0
          for MSG in $MESSAGES; do
            I=$((I+1))
          done

          # 위 재검증 대신, 아예 jq로 필터하여 한번에 실패 여부 계산
          # - 모든 커밋 메시지에 BR_KEY 포함?
          MISSING=$(echo "$COMMITS_JSON" | jq -r '.[].commit.message' | grep -v -E "$BR_KEY" || true)
          if [ -n "$MISSING" ]; then
            echo "❌ Some commits are missing required key $BR_KEY."
            echo "$MISSING"
            exit 1
          fi

          # - 다른 키가 섞여 있나?
          #   (BR_KEY 제외한 다른 CALC-### 발견 시 실패)
          OTHER=$(echo "$COMMITS_JSON" | jq -r '.[].commit.message' | grep -Eo "$PATTERN" | sort -u | grep -v -E "^$BR_KEY$" || true)
          if [ -n "$OTHER" ]; then
            echo "❌ Found other issue keys in commits (must be ONLY $BR_KEY):"
            echo "$OTHER"
            exit 1
          fi

          echo "issue_key=$BR_KEY" >> "$GITHUB_OUTPUT"

      # ====== (옵션) Jira에 이슈가 실제 존재하는지 검증 ======
      # 필요 없으면 아래 step 전체 삭제해도 됨
      - name: Validate issue exists in Jira (optional)
        if: ${{ secrets.JIRA_BASE_URL != '' && secrets.JIRA_EMAIL != '' && secrets.JIRA_API_TOKEN != '' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.collect.outputs.issue_key }}
        run: |
          set -euo pipefail
          AUTH=$(printf "%s:%s" "$JIRA_EMAIL" "$JIRA_API_TOKEN" | base64 -w 0)

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Basic $AUTH" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$ISSUE_KEY")

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Jira issue not found or not accessible: $ISSUE_KEY (HTTP $STATUS)"
            exit 1
          fi

          echo "✅ Jira issue exists: $ISSUE_KEY"
